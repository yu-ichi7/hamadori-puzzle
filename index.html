<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>鳥あつめパズル - 野鳥の合体パズルゲーム</title>
  <link rel="stylesheet" href="./css/style.css">
</head>
<body>
  <div class="wrap">
    <header>
      <h1>鳥あつめパズル</h1>
      <div class="btns">
        <button id="puzzleSwitchBtn">🧩 かえる</button>
      </div>
    </header>
    <div class="puzzle-label" id="puzzleLabel">干潟の鳥パズル</div>

    <div class="hud" style="width:100%; justify-content: space-between;">
      <div style="display:flex; gap:8px;">
        <div class="box">
          <div class="label">スコア</div>
          <div class="value" id="score">0</div>
        </div>
        <div class="box">
          <div class="label">ベスト</div>
          <div class="value" id="best">0</div>
        </div>
      </div>
      <div class="box next-box">
        <div class="label">つぎ</div>
        <canvas id="next" width="48" height="48"></canvas>
        <div class="next-name" id="nextName"></div>
      </div>
      <div class="btns hud-btns">
        <button id="shakeBtn">🌀 ゆらす <span id="shakeCount">×0</span></button>
        <button id="zukanBtn">鳥図鑑</button>
        <button id="muteBtn">🔊</button>
      </div>
    </div>

    <div class="game-area">
      <canvas id="game"></canvas>
    </div>
    <div class="hint">指やマウスで左右にねらいをつけて、離すと落ちるよ。同じ鳥がくっつくと大きな鳥に！</div>
  </div>

  <!-- トースト（新種解放） -->
  <div id="toast"></div>

  <!-- 鳥図鑑モーダル（カテゴリ選択式） -->
  <div class="modal" id="zukanModal">
    <div class="panel zukan-panel">
      <div class="panel-head">
        <h2>鳥図鑑</h2>
        <button id="zukanClose" class="x-close">✕ とじる</button>
      </div>
      <div class="count">であった鳥: <span id="zukanCount">0 / 44</span></div>
      <div id="zukanGrid"></div>
    </div>
  </div>

  <!-- パズル選択モーダル -->
  <div class="modal" id="selectModal">
    <div class="panel">
      <h2>あそぶパズルをえらぶ</h2>
      <div class="puzzle-cards" id="selectPuzzles"></div>
      <div class="close-row"><button id="startBtn" disabled>はじめる</button></div>
    </div>
  </div>

  <!-- ゲームオーバーモーダル -->
  <div class="modal" id="overModal">
    <div class="panel">
      <h2>ゲームオーバー</h2>
      <div>スコア</div>
      <div id="finalScore">0</div>
      <div id="newBest">🏆 ハイスコア更新！</div>
      <button id="retryBtn">もういちど</button>
    </div>
  </div>

  <!-- file:// でも動くよう、type="module" は使わず順番に読み込む -->
  <script src="./vendor/matter.min.js"></script>
  <script src="./js/birds-data.js"></script>
  <script src="./js/draw-bird.js"></script>
  <script src="./js/audio.js"></script>
  <script src="./js/physics.js"></script>
  <script src="./js/merge.js"></script>
  <script src="./js/input.js"></script>
  <script src="./js/items.js"></script>
  <script src="./js/zukan.js"></script>
  <script src="./js/game.js"></script>
  <script src="./js/puzzle-select.js"></script>
</body>
</html>
